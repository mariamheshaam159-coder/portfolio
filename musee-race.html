<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musée d'Orsay Prints Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="petalia-race-page musee-four-stage-page" data-race-positions="88.2vw,59.6vw,31vw,1.8vw">

<a class="kitty-nav-return" href="prints.html" aria-label="Back to previous page">
  <span class="kitty-nav-return-icon">‹</span>
  <span class="kitty-nav-return-text">Back</span>
</a>

  <main class="petalia-race-stage">
    <section class="petalia-content-area musee-four-stage-content" aria-live="polite">
      <div class="petalia-project-screen musee-stage-screen is-active" aria-label="Brochure Design project page">
        <h1 class="musee-screen-title" data-musee-edit="title-1" style="--musee-x:0px; --musee-y:0px; --musee-scale:1; --musee-width:1280px; --musee-font:56px;">Brochure Design</h1>
        <img class="musee-stage-image" data-musee-edit="image-1" style="--musee-x:0px; --musee-y:-143px; --musee-scale:0.9; --musee-width:1280px;" src="assets/musee-stage-1-brochure.png" alt="Brochure Design project content" />
      </div>

      <div class="petalia-project-screen musee-stage-screen" aria-label="Flyer Design project page 1">
        <h1 class="musee-screen-title" data-musee-edit="title-2" style="--musee-x:0px; --musee-y:0px; --musee-scale:1; --musee-width:1280px; --musee-font:56px;">Flyer Design</h1>
        <img class="musee-stage-image" data-musee-edit="image-2" style="--musee-x:0px; --musee-y:-140px; --musee-scale:0.9; --musee-width:1152px;" src="assets/musee-stage-2-flyer.png" alt="Flyer Design project content" />
      </div>

      <div class="petalia-project-screen musee-stage-screen" aria-label="Flyer Design project page 2">
        <h1 class="musee-screen-title" data-musee-edit="title-3" style="--musee-x:0px; --musee-y:0px; --musee-scale:1; --musee-width:1280px; --musee-font:56px;">Flyer Design</h1>
        <img class="musee-stage-image" data-musee-edit="image-3" style="--musee-x:0px; --musee-y:-170px; --musee-scale:0.77; --musee-width:1280px;" src="assets/musee-stage-3-flyer.png" alt="Flyer Design project content variation" />
      </div>

      <div class="petalia-project-screen musee-stage-screen" aria-label="Catalog Cover project page">
        <h1 class="musee-screen-title" data-musee-edit="title-4" style="--musee-x:0px; --musee-y:0px; --musee-scale:1; --musee-width:1280px; --musee-font:56px;">Catalog Cover</h1>
        <img class="musee-stage-image" data-musee-edit="image-4" style="--musee-x:0px; --musee-y:-160px; --musee-scale:0.9; --musee-width:1280px;" src="assets/musee-stage-4-catalog-cover.png" alt="Catalog Cover project content" />
      </div>
    </section>

    <div class="petalia-click-hint">
      <span>Click here to navigate</span>
      <img class="petalia-curved-arrow" src="assets/petalia-curved-arrow.png" alt="" />
    </div>

    <section class="petalia-road-zone" aria-label="Musée d'Orsay racing navigation">
      <img class="petalia-road" src="assets/petalia-racing-line.png" alt="Racing line" />

      <button class="petalia-car-btn" type="button" aria-label="Move to next Musée d'Orsay page" style="--race-step-x: 88.2vw;">
        <img src="assets/petalia-cat-car.png" alt="Hello Kitty racing car" />
      </button>

      <div class="petalia-road-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span class="is-active"></span>
      </div>
    </section>
  </main>
<script src="script.js"></script>
</body>
</html>
