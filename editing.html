<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Inter:wght@700;800;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="branding-page-clean final-branding-manual-page editing-replaced-page">

<a class="kitty-nav-return" href="work.html" aria-label="Back to previous page">
  <span class="kitty-nav-return-icon">‹</span>
  <span class="kitty-nav-return-text">Back</span>
</a>

  <main class="branding-clean-shell adjustable-element" data-adjust-id="outer-frame">
    <a class="branding-clean-back adjustable-element" data-adjust-id="back-arrow" href="work.html" aria-label="Back to Work" style="display:none;">
      <img src="assets/branding-clean-arrow.png" alt="">
    </a>

    <h1 class="branding-clean-title adjustable-element" data-adjust-id="main-title">Editing</h1>

    <section class="branding-clean-list adjustable-element" data-adjust-id="sections-wrapper" aria-label="Branding projects">
      <article class="branding-clean-card adjustable-element" data-adjust-id="petalia-section">
        <img class="branding-clean-folder adjustable-element" data-adjust-id="petalia-folder" src="assets/video-abtalks-folder-clean.png" alt="AB Talks folder">

        <div class="branding-clean-copy adjustable-element" data-adjust-id="petalia-copy">
          <h2 class="adjustable-element" data-adjust-id="petalia-heading">AB Talks Teaser</h2>
          <p class="adjustable-element" data-adjust-id="petalia-paragraph">Nancy Ajram Episode</p>

          <a class="branding-clean-btn adjustable-element" data-adjust-id="petalia-button" href="teaser.html">
            <span>Watch Video</span>
            <span class="branding-clean-btn-icon adjustable-element" data-adjust-id="petalia-button-arrow">
              <img src="assets/branding-clean-arrow.png" alt="">
            </span>
          </a>
        </div>
      </article>

      <article class="branding-clean-card adjustable-element" data-adjust-id="tango-section">
        <img class="branding-clean-folder adjustable-element" data-adjust-id="tango-folder" src="assets/video-movie-folder-clean.png" alt="Movie trailer folder">

        <div class="branding-clean-copy adjustable-element" data-adjust-id="tango-copy">
          <h2 class="adjustable-element" data-adjust-id="tango-heading">Maleficent Trailer</h2>
          <p class="adjustable-element" data-adjust-id="tango-paragraph">Re-trailer</p>

          <a class="branding-clean-btn adjustable-element" data-adjust-id="tango-button" href="trailer.html">
            <span>Watch Video</span>
            <span class="branding-clean-btn-icon adjustable-element" data-adjust-id="tango-button-arrow">
              <img src="assets/branding-clean-arrow.png" alt="">
            </span>
          </a>
        </div>
      </article>
    </section>
  </main>
