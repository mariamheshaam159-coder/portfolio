<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Mark Case Study Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="petalia-race-page wordmark-two-stage-page wordmark-petalia-copy-page" data-race-positions="88.2vw,1.8vw">

<a class="kitty-nav-return" href="branding.html" aria-label="Back to previous page">
  <span class="kitty-nav-return-icon">‹</span>
  <span class="kitty-nav-return-text">Back</span>
</a>

  <main class="petalia-race-stage">
    <section class="petalia-content-area wordmark-two-stage-content" aria-live="polite">
      <div class="petalia-project-screen wordmark-stage-screen is-active" aria-label="Word Mark project page">
        <h1 class="wordmark-screen-title" data-wm-edit="word-title">Word Mark</h1>
        <img class="wordmark-stage-image" data-wm-edit="word-image" style="--wm2-x:-84px; --wm2-y:-225px; --wm2-scale:0.75;" src="assets/wordmark-stage-1.png" alt="Word Mark project content with Tango image" />
      </div>

      <div class="petalia-project-screen wordmark-stage-screen" aria-label="Letter Mark project page">
        <h1 class="wordmark-screen-title" data-wm-edit="letter-title">Letter Mark</h1>
        <img class="wordmark-stage-image" data-wm-edit="letter-image" style="--wm2-x:-84px; --wm2-y:-225px; --wm2-scale:0.75;" src="assets/wordmark-stage-2.png" alt="Letter Mark project content with T image" />
      </div>
    </section>

    <div class="petalia-click-hint">
      <span>Click here to navigate</span>
      <img class="petalia-curved-arrow" src="assets/petalia-curved-arrow.png" alt="" />
    </div>

    <section class="petalia-road-zone" aria-label="Word Mark racing navigation">
      <img class="petalia-road" src="assets/petalia-racing-line.png" alt="Racing line" />

      <button class="petalia-car-btn" type="button" aria-label="Move to next Word Mark page" style="--race-step-x: 88.2vw;">
        <img src="assets/petalia-cat-car.png" alt="Hello Kitty racing car" />
      </button>

      <div class="petalia-road-dots petalia-road-dots-two" aria-hidden="true">
        <span></span>
        <span class="is-active"></span>
      </div>
    </section>
  </main>
<script src="script.js"></script>
</body>
</html>
