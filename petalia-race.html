<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petalia Case Study Race</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="petalia-race-page">

<a class="kitty-nav-return" href="branding.html" aria-label="Back to previous page">
  <span class="kitty-nav-return-icon">‹</span>
  <span class="kitty-nav-return-text">Back</span>
</a>

  <main class="petalia-race-stage">
    <section class="petalia-content-area" aria-live="polite">
      <img class="petalia-project-screen is-active" src="assets/petalia-page-1.png" alt="Petalia page 1" />
      <img class="petalia-project-screen" src="assets/petalia-page-2.png" alt="Petalia page 2" />
      <img class="petalia-project-screen" src="assets/petalia-project-3.png" alt="Petalia page 3" />
      <img class="petalia-project-screen" src="assets/petalia-project-4.png" alt="Petalia page 4" />
    </section>

    


    <div class="petalia-click-hint">
      <span>Click here to navigate</span>
      <img class="petalia-curved-arrow" src="assets/petalia-curved-arrow.png" alt="" />
    </div>

    <section class="petalia-road-zone" aria-label="Petalia racing navigation">
      <img class="petalia-road" src="assets/petalia-racing-line.png" alt="Racing line" />

      <button class="petalia-car-btn" type="button" aria-label="Move to next Petalia page">
        <img src="assets/petalia-cat-car.png" alt="Hello Kitty racing car" />
      </button>

      <div class="petalia-road-dots" aria-hidden="true">
        <span class="is-active"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </section>
  </main>
<script src="script.js"></script>
</body>
</html>
